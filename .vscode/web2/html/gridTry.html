<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridtry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-4 bg-dark border border-dark">Column 1</div>
            <div class="col-4 bg-primary border border-dark">Column 2</div>
            <div class="col-4 bg-danger border border-dark">Column 3</div>
        </div>
        <div class="">
            <div class="col-8 border border-dark">col 4</div>
            <div class="col-4 border border-dark">col 5</div>
        </div>
        <div class="row">
            <div class="col border border-dark">1</div>
            <div class="col border border-dark">2</div>
            <div class="col border border-dark">3</div>
            <div class="col border border-dark">4</div>
            <div class="col border border-dark">5</div>
            <div class="col border border-dark">6</div>
            <div class="col border border-dark">7</div>
            <div class="col border border-dark">8</div>
            <div class="col border border-dark">9</div>
            <div class="col border border-dark">10</div>
            <div class="col border border-dark">11</div>
            <div class="col border border-dark">12</div>

        </div>
   
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
